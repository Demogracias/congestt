name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - run: npx vitest run src/tests/SqlitePersistence.test.ts src/tests/PlannerService.test.ts
        env:
          CI: true

  api-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: Setup test data
        run: |
          mkdir -p ../data
          cp src/tests/fixtures/*.json ../data/

      - name: Build & start server
        run: |
          npm run build
          node dist/index.js &
          sleep 4

      - name: Run API tests
        run: npx vitest run src/tests/Api.test.ts
        env:
          CI: true
