version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - congestt-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3001
      - HOST=0.0.0.0
      - CORS_ORIGIN=*
      - JWT_SECRET=${JWT_SECRET:-}
    restart: unless-stopped

volumes:
  congestt-data:
